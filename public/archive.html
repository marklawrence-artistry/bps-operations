<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Archive - BPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="archive-page">
    <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox" title="Toggle Navigation">
    <div class="content">
        <label for="nav-toggle" class="sidebar-overlay"></label>
        <div class="sidebar">
            <div class="sidebar-header">
                <img src="logo/Bicodo Postal Services Logo.png" alt="BPS Logo">
                <h2>Welcome Back!</h2>
                <p>BPS Records System</p>
            </div>

            <div class="sidebar-content">
                <div class="nav-label">Overview</div>
                <a class="nav-item" href="dashboard.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/dashboard-icon.png" alt="Dashboard">
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" href="audit-log.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/audit_log_icon.png" alt="Audit Log">
                    <span>Audit Log</span>
                </a>
                <a class="nav-item" href="reports.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/reports_icon.png" alt="reports">
                    <span>Reports</span>
                </a>

                <div class="nav-label">Staff</div>
                <a class="nav-item" href="inventory.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/inventory_icon.png" alt="Inventory">
                    <span>Inventory</span>
                </a>
                <a class="nav-item" href="sellers.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/sellers_icon.png" alt="Sellers">
                    <span>Sellers</span>
                </a>

                <a class="nav-item" href="rts.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/returned_icon.png" alt="Returned-to-Seller">
                    <span>Returned-to-Seller</span>
                </a>
                <a class="nav-item" href="documents.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/document_icon.png" alt="Documents">
                    <span>Documents</span>
                </a>

                <div class="nav-label">Admin</div>
                <a class="nav-item admin-nav" href="sales.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/sales_icon.png" alt="Sales">
                    <span>Sales</span>
                </a>
                <a class="nav-item admin-nav" href="accounts.html">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/accounts_icon.png" alt="Accounts">
                    <span>Accounts</span>
                </a>
                <a class="nav-item admin-nav active" href="archive.html">
                    <img src="Icons/archive.png" alt="Accounts">
                    <span>Archive</span>
                </a>
                <a class="nav-item" href="settings.html">
                    <img src="Icons/settings.png" alt="Accounts">
                    <span>Settings</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <a class="nav-item" href="#" id="logout-button">
                    <img src="Icons/Sidebar-Navigation Bar (All Pages)/sign-out.png" alt="Log out">
                    <span>Log out</span>
                </a>
            </div>
        </div>
        <div class="main-content">
            <div class="main-header">
                <div class="header-left">
                    <label for="nav-toggle" class="hamburger">
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                    </label>
                    <h1>System Archive</h1>
                </div>
                <div class="user-info">
                    <h4>Admin</h4>
                    <p>Archive Access</p>
                </div>
            </div>
            <div class="main" style="padding: 2rem;">
                <div class="account-actions">
                    <select id="archive-module-select" style="padding: 0.5rem; border-radius: 10px; border: 1px solid #e5e7eb;">
                        <option value="inventory">Inventory</option>
                        <option value="seller">Sellers</option>
                        <option value="rts">Returned-to-Seller</option>
                        <option value="documents">Documents</option>
                        <option value="weekly_sales">Sales</option>
                        <!-- NEW OPTION -->
                        <option value="audit_logs">Audit Logs (Older than 1 Year)</option>
                    </select>
                </div>

                <div class="table-card">
                    <table class="table" id="archive-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Record Name / Title</th>
                                <th>Date Originally Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="js/main.js" type="module"></script>
</body>
</html>
