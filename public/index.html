<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BPS Records System</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body class="login-body">
    
    <!-- Wrapper to center the card -->
    <div class="login-page-wrapper">
        
        <div class="login-card">
            <!-- Left Side (Gradient Blue) -->
            <div class="login-left">
                <div class="login-logo-container">
                    <!-- White version of logo for dark background -->
                    <img src="logo/Bicodo Postal Services Logo.png" alt="BPS Logo" class="login-logo-brand"> 
                </div>
                
                <div class="login-left-text">
                    <h1>Secure Access</h1>
                    <p>Log in to your personal account to manage parcels, inventory, and track records efficiently.</p>
                </div>
            </div>

            <!-- Right Side (Form) -->
            <div class="login-right">
                <div class="login-form-wrapper">
                    <h2>Welcome Back</h2>
                    <p class="login-subtext">Please enter your details to sign in.</p>

                    <form id="login-form">
                        <div class="login-input-group">
                            <label for="login-email">Email Address</label>
                            <input type="email" id="login-email" placeholder="name@company.com" required>
                        </div>

                        <div class="login-input-group">
                            <label for="login-password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="login-password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="login-btn">Log in</button>

                        <div class="login-options">
                            <span class="divider-text">or continue with</span>
                            <a href="#" id="forgot-password-link">Forgot password?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <!-- Forgot Password Modal (Kept functionality) -->
    <div id="forgot-password-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Reset Password</h2>
                <span class="close-modal" id="close-fp-modal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="fp-step-1">
                    <div class="form-item">
                        <label>Enter your email address</label>
                        <input type="email" id="fp-email" required placeholder="user@example.com">
                    </div>
                    <button type="submit" class="btn-orange" style="width:100%">Next</button>
                </form>

                <form id="fp-step-2" style="display:none;">
                    <p id="fp-question-display" style="font-weight:bold; margin-bottom:1rem; color:#2e3b97;"></p>
                    
                    <div class="form-item">
                        <label>Your Answer</label>
                        <input type="text" id="fp-answer" required>
                    </div>
                    <div class="form-item">
                        <label>New Password</label>
                        <input type="password" id="fp-new-pass" required minlength="8">
                    </div>
                    <button type="submit" class="btn-orange" style="width:100%">Reset Password</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js" type="module"></script>
    <script>
        // Inline script to wire up the new forgot password link ID
        document.addEventListener('DOMContentLoaded', () => {
            const fpLink = document.getElementById('forgot-password-link');
            const fpModal = document.getElementById('forgot-password-modal');
            const closeBtn = document.getElementById('close-fp-modal');
            const step1 = document.getElementById('fp-step-1');
            const step2 = document.getElementById('fp-step-2');

            if(fpLink && fpModal) {
                fpLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    fpModal.style.display = 'flex';
                    step1.style.display = 'block';
                    step2.style.display = 'none';
                });
                closeBtn.addEventListener('click', () => fpModal.style.display = 'none');
                window.addEventListener('click', (e) => {
                    if (e.target == fpModal) fpModal.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
